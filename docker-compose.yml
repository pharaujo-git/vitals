services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vitals
      POSTGRES_PASSWORD: vitals
      POSTGRES_DB: vitals
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vitals']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://vitals:vitals@db:5432/vitals
      JWT_SECRET: ${JWT_SECRET:-change-me-for-anything-but-local-demo}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  pgdata:
