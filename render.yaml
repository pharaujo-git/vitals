# Render blueprint: one free Postgres + one free web service (API + SPA).
# After the first deploy, seed demo data once from the service shell:
#   python seed.py
databases:
  - name: vitals-db
    plan: free

services:
  - type: web
    name: vitals
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vitals-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
